<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Lịch Trạch Nhật (Giao Diện Thập Nhị Dạ Xoa Tối Ưu)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap');
    body { font-family: 'Noto Serif', serif; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 3px; }

    .paper-table { width: 100%; border-collapse: collapse; border: 2px solid #000; background: #fff; color: #000; table-layout: fixed; }
    .paper-table td, .paper-table th { border: 1px solid #555; padding: 6px; vertical-align: top; word-wrap: break-word; }
    
    .hour-table { min-width: 600px; table-layout: auto; }
    .hour-table td { vertical-align: middle; }

    .header-cell { background-color: #e5e7eb; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid #999; padding: 4px; }
    .hour-cell { font-size: 11px; text-align: center; padding: 4px 2px !important; }
    .text-red-print { color: #cc0000; }

    .calendar-grid-container { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; background-color: rgba(255, 255, 255, 0.2); gap: 1px; }
    .calendar-cell { background-color: rgba(0, 0, 0, 0.45); padding: 4px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .calendar-cell:hover { background-color: rgba(255, 255, 255, 0.1); }
    .calendar-cell.selected { background-color: rgba(217, 119, 6, 0.85); color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    .calendar-cell.selected .lunar-text { color: #fef3c7; font-weight: bold; }
    
    .day-number { font-size: 1.1rem; font-weight: bold; text-align: right; line-height: 1; position: relative; z-index: 2; }
    .lunar-text { font-size: 0.7rem; text-align: center; color: #d6d3d1; margin-top: 2px; position: relative; z-index: 2; }
    .good-day-dot { position: absolute; bottom: 4px; right: 4px; width: 10px; height: 10px; background-color: #4ade80; border-radius: 50%; box-shadow: 0 0 8px #4ade80; border: 1px solid #fff; z-index: 2; }

    .buddhist-lotus-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; opacity: 0.35; z-index: 1; pointer-events: none; filter: drop-shadow(0px 0px 5px rgba(255, 105, 180, 0.8)); }

    @media (max-width: 768px) {
        .text-9xl { font-size: 4.5rem !important; line-height: 1 !important; }
        #leftDay { font-size: 3.5rem !important; }
        .calendar-cell { padding: 2px; }
        .day-number { font-size: 0.9rem; }
        .buddhist-lotus-bg { font-size: 1.5rem; }
        aside { height: 580px !important; flex: none; }
        aside > div:nth-child(3) { height: 35% !important; } 
        aside > div:nth-child(4) { height: 65% !important; } 
    }
  </style>
</head>
<body class="bg-stone-300 h-screen flex flex-col overflow-hidden">

  </header>

  <div class="flex-1 flex flex-col md:flex-row w-full overflow-y-auto md:overflow-hidden custom-scroll">

            <div class="flex items-end justify-between w-full border-b border-white/30 pb-2 mb-2">
                <div class="flex flex-col items-start">
                    <div class="text-[70px] font-bold leading-none font-serif drop-shadow-[0_4px_6px_rgba(0,0,0,0.9)] text-white" id="leftDay">01</div>
                    <span class="text-lg font-bold uppercase tracking-widest text-amber-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] mt-1" id="leftWDay">Thứ ...</span>

                <div class="text-right flex flex-col items-end">

                <div class="flex items-center gap-1 text-pink-400"><i class="fa-solid fa-dharmachakra"></i> Lễ Phật</div>
            </div>
        </div>
    </aside>

    <main class="w-full md:w-[65%] bg-stone-300 p-2 md:p-6 md:overflow-y-auto custom-scroll flex flex-col items-center flex-1">

  </div>

    function checkNgayHoangDao(thangChiIdx, ngayChiIdx) {
        const khoiDaoMap = { 1: 0, 7: 0, 2: 2, 8: 2, 3: 4, 9: 4, 4: 6, 10: 6, 5: 8, 11: 8, 6: 10, 0: 10 };
        let khoiIdx = khoiDaoMap[thangChiIdx];
        let distance = (ngayChiIdx - khoiIdx + 12) % 12;
        const hoangDaoPositions = [0, 1, 3, 4, 7, 9];
        return hoangDaoPositions.includes(distance);
    }

    function getJulianDay(d, m, y) { if (m <= 2) { m += 12; y -= 1; } let A = Math.floor(y / 100); let B = 2 - A + Math.floor(A / 4); return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5; }
    function getSolarInfo(d, m) { let currentVal = m * 100 + d; let foundTerm = CAL_DATA.SOLAR_TERMS_FIXED[CAL_DATA.SOLAR_TERMS_FIXED.length - 1]; let sortedTerms = [...CAL_DATA.SOLAR_TERMS_FIXED].sort((a, b) => (a.m * 100 + a.d) - (b.m * 100 + b.d)); for (let i = 0; i < sortedTerms.length; i++) { let term = sortedTerms[i]; if (currentVal >= (term.m * 100 + term.d)) foundTerm = term; else break; } if (m === 1 && d < 5) return { name: "Đông chí", chiMonth: 0 }; return { name: foundTerm.name, chiMonth: foundTerm.chiMonth }; }
    function getCanChiDay(d, m, y) { let jd = getJulianDay(d, m, y); let jdn = Math.floor(jd + 0.5); let dayCanIdx = (jdn + 9) % 10; let dayChiIdx = (jdn + 1) % 12; return { full: `${CAL_DATA.CAN[dayCanIdx]} ${CAL_DATA.CHI[dayChiIdx]}`, canIdx: dayCanIdx, chiIdx: dayChiIdx }; }
    function getTruc(dayChiIdx, solarInfo) { return CAL_DATA.TRUC[(dayChiIdx - solarInfo.chiMonth + 12) % 12]; }
    function getDayRating(cIdx, chIdx) { let ec = CAL_DATA.ELEMENTS.CAN[cIdx]; let ech = CAL_DATA.ELEMENTS.CHI[chIdx]; if (ec === ech) return { name: "Bát Chuyên (Đồng Khí)", color: "text-stone-600", desc: "Ngày bình hòa." }; if ((ec===0&&ech===2)||(ec===2&&ech===1)||(ec===1&&ech===3)||(ec===3&&ech===4)||(ec===4&&ech===0)) return { name: "Bảo Nhật (Đại Cát)", color: "text-green-700", desc: "Rất tốt cho mọi việc." }; if ((ech===0&&ec===2)||(ech===2&&ec===1)||(ech===1&&ec===3)||(ech===3&&ec===4)||(ech===4&&ec===0)) return { name: "Thoa Nhật (Tiểu Cát)", color: "text-blue-700", desc: "Tốt vừa, có thể dùng." }; if ((ec===0&&ec===1)||(ec===1&&ech===4)||(ec===4&&ech===2)||(ec===2&&ech===3)||(ec===3&&ech===0)) return { name: "Chế Nhật (Tiểu Hung)", color: "text-amber-600", desc: "Xấu nhẹ, thận trọng." }; return { name: "Phạt Nhật (Đại Hung)", color: "text-red-600 font-bold", desc: "Can khắc Chi. Kỵ làm đại sự." }; }
    function getTuoiXungTrongNgay(dayCanIdx, dayChiIdx) { let xungChiIdx = (dayChiIdx + 6) % 12; let badAges = []; let canXung1 = (dayCanIdx + 4) % 10; badAges.push(CAL_DATA.CAN[canXung1] + " " + CAL_DATA.CHI[xungChiIdx]); let canXung2 = (dayCanIdx + 6) % 10; badAges.push(CAL_DATA.CAN[canXung2] + " " + CAL_DATA.CHI[xungChiIdx]); badAges.push(CAL_DATA.CAN[canXung2] + " " + CAL_DATA.CHI[dayChiIdx]); return badAges.join(", "); }
    function checkXungTuoi(dayChiIdx) { const uYear = document.getElementById("birthYear").value; if(!uYear || uYear === "") return false; const uChiIdx = (uYear - 4) % 12; let diff = Math.abs(uChiIdx - dayChiIdx); return diff === 6 || diff === 0; }
    
    function getBadDaysInfo(lMonth, lDay, dCanIdx, dChiIdx) { 
        let notes = []; 
        if ([3, 7, 13, 18, 22, 27].includes(lDay)) notes.push({ name: "Tam Nương", desc: "Kỵ khai trương, xuất hành, cưới hỏi." }); 
        if ([5, 14, 23].includes(lDay)) notes.push({ name: "Nguyệt Kỵ", desc: "Kỵ xuất hành đi xa, khởi công." }); 
        if (dChiIdx === CAL_DATA.TAM_TANG_MAP[lMonth]) notes.push({ name: "Tam Tang", desc: "Đại kỵ khởi công, cưới hỏi và an táng." }); 
        if (CAL_DATA.TRUNG_TANG_MAP[lMonth] && CAL_DATA.TRUNG_TANG_MAP[lMonth].includes(dCanIdx)) notes.push({ name: "Trùng Tang", desc: "Đại kỵ trong việc tang sự, an táng." }); 
        if (dChiIdx === CAL_DATA.TRUNG_NHAT_MAP[lMonth]) notes.push({ name: "Trung Nhật", desc: "Kỵ làm đại sự đất đai hoặc di chuyển linh cữu." }); 
        if (dChiIdx === CAL_DATA.THO_TU_MAP[lMonth]) notes.push({ name: "Thọ Tử", desc: "Ngày trăm sự đều kỵ. Tuyệt đối tránh làm việc lớn." }); 
        
        if (CAL_DATA.SAT_CHU_DUONG_MAP[lMonth] && CAL_DATA.SAT_CHU_DUONG_MAP[lMonth].includes(dChiIdx)) {
            notes.push({ name: "Sát Chủ Dương", desc: "Kỵ việc người sống: Xây nhà, cưới hỏi, khai trương." }); 
        }
        if (CAL_DATA.SAT_CHU_AM_MAP[lMonth] && CAL_DATA.SAT_CHU_AM_MAP[lMonth].includes(dChiIdx)) {
            notes.push({ name: "Sát Chủ Âm", desc: "Kỵ việc người chết: Khâm liệm, an táng, đào huyệt." }); 
        }
        return notes; 
    }

    function evaluateTaskDetailed(task, truc, badDaysList, isXungTuoiCaNhan) { 
        let isGood = true; 
        let isVeryGood = false;
        let successReasons = []; 
        let failReasons = []; 
        let warningReasons = [];

        if (task === "ALL") {
            let fatal = badDaysList.filter(b => ["Sát Chủ Dương", "Sát Chủ Âm", "Thọ Tử", "Tam Tang", "Trung Nhật", "Trùng Tang"].includes(b.name));
            isGood = !isXungTuoiCaNhan && fatal.length === 0 && !["Phá", "Bế"].includes(truc);
            isVeryGood = isGood && badDaysList.length === 0 && ["Kiến", "Mãn", "Bình", "Định", "Thành", "Khai"].includes(truc);
            return { isGood, isVeryGood, successReasons, failReasons, warningReasons, taskName: "Khảo Sát Chung", goodStars: "" };
        }

        const rules = TASK_RULES[task]; 
        if (isXungTuoiCaNhan) { 
            if (task === "TANG_SU") {
                warningReasons.push("Ngày Xung/Trùng với tuổi người mất: <b style='color:#b30000;'>ĐẠI KỴ ĐI CHÔN (HẠ HUYỆT)</b>. Tuy nhiên, nếu gia đình chọn hình thức <b style='color:#d35400;'>HỎA THIÊU</b> thì vẫn có thể dùng được bình thường.");
            } else {
                isGood = false; 
                failReasons.push("Ngày Xung/Trùng với tuổi bản mệnh (Đại Hung)."); 
            }
        } 

        const fatalBadDays = badDaysList.filter(b => rules.badDays.includes(b.name));
        const minorBadDays = badDaysList.filter(b => !rules.badDays.includes(b.name) && b.name !== "Sát Chủ Dương" && b.name !== "Sát Chủ Âm"); 

        if (fatalBadDays.length > 0) { 
            isGood = false; 
            failReasons.push(`Phạm ngày Đại Kỵ: <b>${fatalBadDays.map(b=>b.name).join(", ")}</b>.`); 
        }

        if (minorBadDays.length > 0) {
            warningReasons.push(`Có phạm ngày Thứ Kỵ: <b>${minorBadDays.map(b=>b.name).join(", ")}</b> (Tuy nhiên vẫn có thể châm chước tiến hành nếu chọn được Giờ tốt).`);
        } else if (fatalBadDays.length === 0) {
            successReasons.push(`Ngày hoàn toàn sạch, không phạm bất kỳ ngày Kỵ nào của việc ${rules.name}.`);
        }

        if (rules.badTruc.includes(truc)) { 
            isGood = false; 
            failReasons.push(`Có Trực <b>${truc}</b> là trực Đại Kỵ, cấm dùng cho việc này.`); 
        } else if (rules.goodTruc.includes(truc)) { 
            successReasons.push(`Có Trực <b>${truc}</b> là trực vô cùng thuận lợi (Đại Cát).`); 
        } else {
            successReasons.push(`Trực <b>${truc}</b> ở mức độ bình hòa, dùng tạm ổn (Thứ Cát).`);
        } 
        
        if (isGood && minorBadDays.length === 0 && rules.goodTruc.includes(truc) && !isXungTuoiCaNhan) {
            isVeryGood = true;
        }
        return { isGood, isVeryGood, successReasons, failReasons, warningReasons, taskName: rules.name, goodStars: rules.goodStars }; 
    }

    function getCalendarData(solarDate) {
        const d = new Date(solarDate);
        const formatter = new Intl.DateTimeFormat("fr-CA-u-ca-chinese", { day: "numeric", month: "numeric", year: "numeric" });
        const parts = formatter.formatToParts(d);
        let lDay=1, lMonth=1, lYear=d.getFullYear();
        parts.forEach(p => { if(p.type==="day") lDay=parseInt(p.value); if(p.type==="month") lMonth=parseInt(p.value); if(p.type==="relatedYear") lYear=parseInt(p.value); });
        if (lMonth >= 11 && d.getMonth() < 3 && lYear === d.getFullYear()) lYear -= 1;

        const dayInfo = getCanChiDay(d.getDate(), d.getMonth()+1, d.getFullYear());
        const solarInfo = getSolarInfo(d.getDate(), d.getMonth()+1);
        const truc = getTruc(dayInfo.chiIdx, solarInfo);
        const rating = getDayRating(dayInfo.canIdx, dayInfo.chiIdx);
        let isHoangDao = checkNgayHoangDao(lMonth, dayInfo.chiIdx);
        
        // --- XÁC ĐỊNH NHỊ THẬP BÁT TÚ (28 SAO) CHUẨN XÁC DỰA THEO THỨ TỰ TỊNH TIẾN ---
        // Mốc chuẩn theo thiên văn: Ngày 01/01/1995 (Chủ Nhật) mang sao Hư (Index 10 trong mảng)
        let jd = getJulianDay(d.getDate(), d.getMonth()+1, d.getFullYear());
        let jdn = Math.floor(jd + 0.5);
        let diffDays = jdn - 2449719; // JDN của ngày 01/01/1995
        
        let saoIdx = (10 + (diffDays % 28)) % 28;
        if (saoIdx < 0) saoIdx += 28;
        
        let saoData = CAL_DATA.NHI_THAP_BAT_TU[saoIdx];

        const tuoiXungNgay = getTuoiXungTrongNgay(dayInfo.canIdx, dayInfo.chiIdx);
        const isXungTuoiCaNhan = checkXungTuoi(dayInfo.chiIdx);
        const badDaysList = getBadDaysInfo(lMonth, lDay, dayInfo.canIdx, dayInfo.chiIdx);

        let dTomorrow = new Date(solarDate);
        dTomorrow.setDate(dTomorrow.getDate() + 1);
        const partsT = formatter.formatToParts(dTomorrow);
        let lDayT = 1;
        partsT.forEach(p => { if(p.type==="day") lDayT=parseInt(p.value); });
        let isLastDayOfMonth = (lDayT === 1); 

        let bHoliday = CAL_DATA.BUDDHIST_HOLIDAYS[`${lDay}/${lMonth}`];
        if (!bHoliday && isLastDayOfMonth) {
            if (lDay === 29 && lMonth === 7) bHoliday = CAL_DATA.BUDDHIST_HOLIDAYS["30/7"];
            if (lDay === 29 && lMonth === 9) bHoliday = CAL_DATA.BUDDHIST_HOLIDAYS["30/9"];
        }

        let hourDetails = [];
        const checkGioHoangDao = (dChi, hChi) => { const map = {0:[0,1,3,6,8,9],1:[2,3,5,8,10,11],2:[0,1,4,5,7,10],3:[0,2,3,6,7,9],4:[2,4,5,8,9,11],5:[1,4,6,7,10,11],6:[0,1,3,6,8,9],7:[2,3,5,8,10,11],8:[0,1,4,5,7,10],9:[0,2,3,6,7,9],10:[2,4,5,8,9,11],11:[1,4,6,7,10,11]}; return map[dChi].includes(hChi); };

        for(let i=0; i<12; i++) {
            const canGio = CAL_DATA.CAN[((dayInfo.canIdx % 5) * 2 + i) % 10]; const chiGio = CAL_DATA.CHI[i];
            const ldIdx = (lMonth + lDay + i - 2) % 6; let lucDieuStr = CAL_DATA.LUC_DIEU[ldIdx < 0 ? ldIdx + 6 : ldIdx];
            let isThoTu = (i === CAL_DATA.GIO_THO_TU_MAP[dayInfo.chiIdx]); let isSatChu = (i === CAL_DATA.GIO_SAT_CHU_MAP[lMonth]); let isKhongVong = (lucDieuStr === "Không Vong");

            hourDetails.push({ can: canGio, chi: chiGio, chiIdx: i, str: `${canGio} ${chiGio}<br><span class="text-[9px] text-gray-500">(${(i*2-1+24)%24}h-${(i*2+1)%24}h)</span>`, isGood: checkGioHoangDao(dayInfo.chiIdx, i), lucDieu: lucDieuStr, isThoTu: isThoTu, isSatChu: isSatChu, isKhongVong: isKhongVong });
        }
        
        return { solar: { day: d.getDate(), month: d.getMonth()+1, year: d.getFullYear(), weekday: d.getDay() }, lunar: { day: lDay, month: lMonth, year: lYear }, text: { day: dayInfo.full }, extra: { truc, tietKhi: solarInfo.name, taiThan: CAL_DATA.DIRECTIONS.TAI_THAN[dayInfo.canIdx], badDaysList, isXungTuoiCaNhan, tuoiXungNgay, bHoliday, isHoangDao, sao: saoData }, hourDetails, rating };
    }

    let selDate = new Date();
    const els = { grid: document.getElementById("grid"), paper: document.getElementById("paper"), title: document.getElementById("calTitle"), inp: document.getElementById("dateInput"), yakshaBg: document.getElementById("yakshaBg") };

    function init() { render(); document.getElementById("prevMonth").onclick = () => { selDate.setMonth(selDate.getMonth()-1); render(); }; document.getElementById("nextMonth").onclick = () => { selDate.setMonth(selDate.getMonth()+1); render(); }; els.inp.onchange = (e) => { if(e.target.value) { selDate = new Date(e.target.value); render(); } }; }
    function goToday() { selDate = new Date(); render(); }

    function onSelectDate(y, m, d) {
        selDate = new Date(y, m, d);
        render();
        if (window.innerWidth <= 768) {
            setTimeout(() => { document.getElementById('paper').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }
    }

    function render() {
        const offset = selDate.getTimezoneOffset(); const local = new Date(selDate.getTime() - (offset*60*1000));
        els.inp.value = local.toISOString().split('T')[0];

        let y = selDate.getFullYear(), m = selDate.getMonth();
        els.title.innerText = `THÁNG ${m+1} NĂM ${y}`;
        const filterTask = document.getElementById("taskFilter").value;
        const uYear = document.getElementById("birthYear").value;

        let dData = getCalendarData(selDate);
        let wd = ["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"][dData.solar.weekday];

        document.getElementById("leftDay").innerText = dData.solar.day < 10 ? '0'+dData.solar.day : dData.solar.day;
        document.getElementById("leftWDay").innerText = wd;
        
        let namCanIdx = (dData.lunar.year + 6) % 10;
        let canNam = CAL_DATA.CAN[namCanIdx];
        let chiNam = CAL_DATA.CHI[(dData.lunar.year + 8) % 12];
        
        let thangChiIdx = (dData.lunar.month + 1) % 12;
        let chiThang = CAL_DATA.CHI[thangChiIdx];
        let canThangIdx = ([2, 4, 6, 8, 0][namCanIdx % 5] + dData.lunar.month - 1) % 10;
        let canThang = CAL_DATA.CAN[canThangIdx];

        document.getElementById("leftMonthYear").innerText = `Năm ${canNam} ${chiNam}`;
        document.getElementById("leftLunarDate").innerText = `${dData.lunar.day} / ${dData.lunar.month}`;

        let currentMonthImage = CAL_DATA.YAKSHA_IMAGES[dData.lunar.month] || CAL_DATA.YAKSHA_IMAGES[1];
        els.yakshaBg.style.backgroundImage = `url('${currentMonthImage}')`;

        let d1 = new Date(y, m, 1), days = new Date(y, m+1, 0).getDate(); let start = d1.getDay()===0?6:d1.getDay()-1;
        let html = ""; for(let i=0; i<start; i++) html+=`<div class="bg-black/20"></div>`;
        for(let d=1; d<=days; d++) {
            let cur = new Date(y, m, d); let isSel = cur.toDateString()===selDate.toDateString();
            let data = getCalendarData(cur); 
            let dayClass = "text-white drop-shadow-md"; 
            if (cur.getDay()===0) dayClass = "text-red-400 drop-shadow-md";
            else if (cur.getDay()===6) dayClass = "text-blue-300 drop-shadow-md";
            if (isSel) dayClass = "text-white drop-shadow-lg";
            
            let evalDetail = evaluateTaskDetailed(filterTask, data.extra.truc, data.extra.badDaysList, data.extra.isXungTuoiCaNhan);
            let dotIndicator = "";
            
            if (evalDetail.isGood) {
                if (evalDetail.isVeryGood) {
                    dotIndicator = `<div class="absolute bottom-1 right-1 text-yellow-400 text-[10px] md:text-xs drop-shadow-[0_0_5px_rgba(0,0,0,0.8)]" title="Ngày Đại Cát!"><i class="fa-solid fa-star"></i></div>`;
                } else {
                    dotIndicator = `<div class="good-day-dot" title="Ngày Tạm Ổn (Thứ Cát)"></div>`;
                }
            }

            let buddhistIndicator = data.extra.bHoliday ? `<div class="buddhist-lotus-bg text-pink-400" title="${data.extra.bHoliday.name}"><i class="fa-solid fa-dharmachakra"></i></div>` : "";

            html += `<div class="calendar-cell ${isSel ? 'selected' : ''}" onclick="onSelectDate(${y},${m},${d})">
                ${buddhistIndicator}
                <div class="day-number ${dayClass}">${d}</div>
                <div class="lunar-text">${data.lunar.day}/${data.lunar.month}</div>
                ${dotIndicator}
            </div>`;
        }
        els.grid.innerHTML = html;
        
        let r1="", r2="", r3="";
        dData.hourDetails.forEach(h => {
            let kyTags = [];
            if(h.isThoTu) kyTags.push("Thọ Tử"); if(h.isSatChu) kyTags.push("Sát Chủ");
            let kyHtml = kyTags.length > 0 ? `<br><span class="text-[9px] text-red-600 font-bold block leading-tight mt-1">${kyTags.join(", ")}</span>` : "";
            let lucDieuClass = h.isKhongVong ? "text-red-600 font-bold" : "";

            r1 += `<td class="hour-cell bg-gray-100 font-bold border border-gray-400 w-16">${h.str}</td>`;
            r2 += `<td class="hour-cell font-bold border border-gray-400 ${h.isGood?'text-red-print':''}">${h.isGood?'Hoàng<br>Đạo':'Hắc<br>Đạo'}${kyHtml}</td>`;
            r3 += `<td class="hour-cell border border-gray-400 ${lucDieuClass}">${h.lucDieu.replace(" ","<br>")}</td>`;
        });

        let hourSuggestionHtml = "";
        if (uYear && uYear !== "") {
            let uChiIdx = (uYear - 4) % 12; let recommendedHours = [];
            dData.hourDetails.forEach(h => {
                let isXungGio = Math.abs(uChiIdx - h.chiIdx) === 6; 
                if (h.isGood && !isXungGio && !h.isThoTu && !h.isSatChu && !h.isKhongVong) {
                    let isLucDieuTot = ["Đại An", "Tốc Hỷ", "Tiểu Cát"].includes(h.lucDieu);
                    let badgeClass = isLucDieuTot ? "bg-green-100 text-green-900 border-green-400 shadow-sm" : "bg-blue-50 text-blue-800 border-blue-300";
                    let title = isLucDieuTot ? "Đại Cát" : "Thứ Cát";
                    let timeText = `(${(h.chiIdx*2-1+24)%24}h-${(h.chiIdx*2+1)%24}h)`;
                    recommendedHours.push(`<div class="inline-block border ${badgeClass} px-2 py-1 rounded m-1 text-xs text-center"><b class="uppercase">${h.can} ${h.chi}</b> <span class="text-[10px] text-gray-600">${timeText}</span><br><span class="text-[10px] italic font-bold">${title}: Hoàng Đạo + ${h.lucDieu}</span></div>`);
                }
            });
            if (recommendedHours.length > 0) { hourSuggestionHtml = recommendedHours.join(''); } 
            else { hourSuggestionHtml = `<span class="text-red-600 font-bold text-xs italic">Không có giờ nào trong ngày đạt chuẩn (Tất cả Giờ Hoàng Đạo đều phạm Xung Tuổi, Sát Chủ, Thọ Tử hoặc Không Vong). Tuyệt đối thận trọng!</span>`; }
        } else { hourSuggestionHtml = `<span class="text-stone-500 italic text-xs">Vui lòng nhập Năm Sinh ở thanh menu phía trên để hệ thống tự động loại bỏ Giờ Xung Khắc, Không Vong, Sát Chủ và chọn ra Giờ Đại Cát cho bạn!</span>`; }

        let badDaysHtml = "";
        if (dData.extra.badDaysList.length > 0) { badDaysHtml = `<ul class="list-disc pl-5 space-y-1.5 pt-1">` + dData.extra.badDaysList.map(b => `<li><b class="text-red-700 uppercase">${b.name}:</b> <span class="text-stone-800">${b.desc}</span></li>`).join('') + `</ul>`; } 
        else { badDaysHtml = `<div class="text-green-700 font-bold text-center py-2 bg-green-50 border border-green-200 rounded">Ngày Tốt Chung! Không phạm bất kỳ ngày kỵ đại sự nào.</div>`; }

        let taskAnalysisHtml = "";
        if (filterTask !== "ALL") {
            let evalResult = evaluateTaskDetailed(filterTask, dData.extra.truc, dData.extra.badDaysList, dData.extra.isXungTuoiCaNhan);

            if (evalResult.isGood) {
                let warnings = evalResult.warningReasons.length > 0 ? `<div class="mt-3 pt-2 border-t border-green-300"><ul class="list-disc pl-5 text-amber-700 font-bold">${evalResult.warningReasons.map(r => `<li>${r}</li>`).join('')}</ul></div>` : "";
                
                let rankNote = evalResult.isVeryGood ? 
                    `<div class="mt-2 text-[12px] font-bold text-yellow-600"><i class="fa-solid fa-star"></i> ĐÁNH GIÁ: ĐẠI CÁT (Hiện Sao Vàng trên lịch)</div>` : 
                    `<div class="mt-2 text-[12px] font-bold text-green-700"><div class="inline-block w-2.5 h-2.5 bg-green-500 rounded-full mr-1"></div> ĐÁNH GIÁ: TẠM ỔN / THỨ CÁT (Hiện Chấm Xanh trên lịch)</div>`;
                
                taskAnalysisHtml = `<table class="paper-table mt-[-2px]"><tr><td class="align-top p-0 bg-green-50 border-2 border-green-600 shadow-inner"><div class="header-cell border-b border-green-600 p-2 bg-green-200 text-green-900 tracking-wider"><i class="fa-solid fa-circle-check"></i> CÓ THỂ TIẾN HÀNH VIỆC: ${evalResult.taskName.toUpperCase()}</div><div class="p-3 text-sm leading-relaxed text-green-900">${rankNote}<ul class="list-disc pl-5 space-y-1.5 mt-2">${evalResult.successReasons.map(r => `<li>${r}</li>`).join('')}</ul>${warnings}<div class="mt-2 text-[11px] italic text-stone-600">* Kết hợp với <b>Gợi Ý Giờ Đại Cát</b> ở bên trên và tìm thêm sao tốt: <b>${evalResult.goodStars}</b> để bề thế hanh thông.</div></div></td></tr></table>`;
            } else {
                taskAnalysisHtml = `<table class="paper-table mt-[-2px]"><tr><td class="align-top p-0 bg-red-50 border-2 border-red-400"><div class="header-cell border-b border-red-400 p-2 bg-red-100 text-red-900 tracking-wider"><i class="fa-solid fa-circle-xmark"></i> KHÔNG NÊN DÙNG CHO VIỆC: ${evalResult.taskName.toUpperCase()}</div><div class="p-3 text-sm leading-relaxed text-red-900"><div class="font-bold mb-1">Lý do bị loại bỏ:</div><ul class="list-disc pl-5 space-y-1.5 font-bold">${evalResult.failReasons.map(r => `<li>${r}</li>`).join('')}</ul></div></td></tr></table>`;
            }
        }

        let trucDescHtml = CAL_DATA.TRUC_DESC[dData.extra.truc];
        
        // --- HIỂN THỊ SAO GỌN GÀNG (KHÔNG CÓ NÊN/KỴ) ---
        let starData = dData.extra.sao;
        let starHtml = `
            <div class="border-t border-black pt-2 pb-2 flex flex-col bg-stone-100 h-full justify-center">
                <div class="header-cell bg-stone-200 text-stone-900">Nhị Thập Bát Tú</div>
                <div class="text-center font-bold text-[13px] mt-2 ${starData.color} uppercase">
                    SAO ${starData.name}
                </div>
                <div class="text-center text-[11px] font-bold mt-1 ${starData.color}">
                    [ ${starData.type} ]
                </div>
            </div>
        `;

        let badgeXungTuoiHtml = `<div class="bg-stone-500 text-white font-bold text-center p-1 mb-2 rounded border border-stone-600 text-[10px]">Nhập Tuổi Xét Xung</div>`;
        if (uYear && uYear !== "") {
            if (dData.extra.isXungTuoiCaNhan) {
                if (filterTask === 'TANG_SU') {
                    badgeXungTuoiHtml = `<div class="bg-orange-500 text-white font-bold text-center p-1 mb-2 rounded shadow text-[10px]">XUNG TUỔI (Chỉ Hợp Hỏa Thiêu)</div>`;
                } else {
                    badgeXungTuoiHtml = `<div class="bg-red-600 text-white font-bold text-center p-1 mb-2 rounded shadow text-[10px]">ĐẠI HUNG: XUNG/TRÙNG TUỔI</div>`;
                }
            } else {
                badgeXungTuoiHtml = `<div class="bg-green-600 text-white font-bold text-center p-1 mb-2 rounded shadow text-[10px]">Không Xung Tuổi ${uYear}</div>`;
            }
        }

        let buddhistHtml = "";
        if (dData.extra.bHoliday) {
            buddhistHtml = `
            <table class="paper-table mt-[-2px]"><tr><td class="align-top p-0 bg-pink-50 border-2 border-pink-500 shadow-inner">
                <div class="header-cell border-b border-pink-500 p-2 bg-pink-200 text-pink-900 tracking-wider">
                    <i class="fa-solid fa-dharmachakra"></i> SỰ KIỆN PHẬT GIÁO
                </div>
                <div class="p-3 text-sm leading-relaxed text-pink-900 text-center">
                    <div class="font-bold text-[16px] mb-1 uppercase text-pink-700"><i class="fa-solid fa-dharmachakra"></i> ${dData.extra.bHoliday.name} <i class="fa-solid fa-dharmachakra"></i></div>
                    <div class="italic text-stone-700">${dData.extra.bHoliday.desc}</div>
                </div>
            </td></tr></table>`;
        }
        
        let daoBadge = dData.extra.isHoangDao ? 
            `<div class="bg-red-600 text-white font-bold text-center p-1 mt-2 rounded shadow text-[12px] uppercase">NGÀY HOÀNG ĐẠO</div>` : 
            `<div class="bg-gray-700 text-white font-bold text-center p-1 mt-2 rounded shadow text-[12px] uppercase">NGÀY HẮC ĐẠO</div>`;

        els.paper.innerHTML = `
            <table class="paper-table"><tr>
                <td class="w-[35%] text-center align-top p-3 md:p-4 border-r-2 border-black">
                    <div class="text-xs font-bold uppercase mb-1 border-b border-black pb-1 inline-block">${wd}</div>
                    <div class="text-9xl font-bold leading-none mt-2 font-serif">${dData.solar.day}</div>
                    <div class="text-xs md:text-sm font-bold mt-4 uppercase tracking-widest">Tháng ${dData.solar.month} Năm ${dData.solar.year}</div>
                    
                    <div class="mt-4 pt-2 border-t border-black">
                        <div class="text-[12px] md:text-sm mt-2 flex flex-col items-center justify-center font-bold leading-relaxed space-y-1">
                            <div class="text-red-700 bg-red-50 w-full rounded py-0.5 border border-red-200 shadow-sm">Ngày ${dData.text.day}</div>
                            <div class="text-blue-800 bg-blue-50 w-full rounded py-0.5 border border-blue-200 shadow-sm">Tháng ${canThang} ${chiThang}</div>
                            <div class="text-stone-800 bg-stone-100 w-full rounded py-0.5 border border-stone-300 shadow-sm">Năm ${canNam} ${chiNam}</div>
                        </div>
                    </div>
                </td>
                <td class="w-[30%] text-center bg-stone-50 align-top p-0 border-r-2 border-black">
                    <div class="pt-2"><div class="header-cell">Tiết khí</div><div class="py-2 font-bold text-blue-800 text-sm">${dData.extra.tietKhi}</div></div>
                    <div class="border-t border-black pt-1 pb-2 flex flex-col">
                        <div class="header-cell">Trực ${dData.extra.truc} ${dData.extra.truc==='Thu'?'(Thâu)':''}</div>
                        <div class="text-[10px] text-red-700 font-bold mt-1">${['Phá','Bế','Nguy'].includes(dData.extra.truc) ? 'TRỰC XẤU' : ''}</div>
                        <div class="text-[10px] text-stone-800 mt-1 mb-2 leading-relaxed text-left px-2 font-medium">
                            ${trucDescHtml}
                        </div>
                    </div>
                    ${starHtml}
                </td>
                <td class="w-[35%] align-top p-2 text-[11px] md:text-xs">
                    <div class="header-cell border-b-2 border-black mb-2 py-1 bg-amber-100 text-amber-900">NHẬN XÉT TRẠCH NHẬT</div>
                    <div class="text-center font-bold ${dData.rating.color} uppercase text-[13px] mb-1 border-2 border-dashed border-stone-400 p-1 bg-white rounded">${dData.rating.name}</div>
                    <div class="text-[10px] text-stone-600 italic text-center mb-2 leading-tight">${dData.rating.desc}</div>
                    
                    ${badgeXungTuoiHtml}
                    ${daoBadge}
                    
                    <div class="mt-2 border-t border-gray-400 pt-1 text-[10px]">
                        <div><b class="text-gray-700">Xung Ngày:</b> <span class="text-red-700">${dData.extra.tuoiXungNgay}</span></div>
                        <div class="mt-1"><b class="text-gray-700">Tài Thần:</b> <span class="text-red-700">${dData.extra.taiThan}</span></div>
                    </div>
                </td>
            </tr></table>

            <table class="paper-table mt-[-2px]"><tr><td class="align-top p-0 bg-yellow-50 border-2 border-yellow-500"><div class="header-cell border-b border-yellow-500 p-2 bg-yellow-200 text-yellow-900 tracking-wider"><i class="fa-solid fa-clock"></i> GỢI Ý GIỜ XUẤT HÀNH/KHỞI SỰ TỐT NHẤT CHO TUỔI ${uYear || '...'}</div><div class="p-3 text-sm leading-relaxed text-stone-800 text-center">${hourSuggestionHtml}</div></td></tr></table>
            
            <div class="w-full overflow-x-auto custom-scroll">
                <table class="paper-table hour-table mt-[-2px]">
                    <tr><td class="hour-cell bg-gray-200 font-bold w-12 border border-gray-400">Giờ</td>${r1}</tr>
                    <tr><td class="hour-cell font-bold border border-gray-400">Đạo</td>${r2}</tr>
                    <tr><td class="hour-cell font-bold border border-gray-400">Lục Diệu</td>${r3}</tr>
                </table>
            </div>
            
            ${buddhistHtml}
            ${taskAnalysisHtml}
            
            <table class="paper-table mt-[-2px]"><tr><td class="align-top p-0 bg-stone-50"><div class="header-cell border-b border-black p-1 bg-stone-200 text-stone-900 tracking-wider">CÁC NGÀY KỴ TỔNG QUAN TRONG NGÀY NÀY</div><div class="p-3 text-xs leading-relaxed min-h-[60px]">${badDaysHtml}</div></td></tr></table>
        `;
    }

    init();
  </script>
</body>
</html>
