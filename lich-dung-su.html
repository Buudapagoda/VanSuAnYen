<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Lịch Trạch Nhật Tối Ưu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap');
    body { font-family: 'Noto Serif', serif; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 3px; }

    .paper-table { width: 100%; border-collapse: collapse; border: 2px solid #000; background: #fff; color: #000; table-layout: fixed; }
    .paper-table td, .paper-table th { border: 1px solid #555; padding: 6px; vertical-align: top; word-wrap: break-word; }
    
    .hour-table { min-width: 600px; table-layout: auto; }
    .hour-table td { vertical-align: middle; }

    .header-cell { background-color: #e5e7eb; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid #999; padding: 4px; }
    .hour-cell { font-size: 11px; text-align: center; padding: 4px 2px !important; }
    .text-red-print { color: #cc0000; }

    .calendar-grid-container { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; background-color: rgba(255, 255, 255, 0.2); gap: 1px; }
    .calendar-cell { background-color: rgba(0, 0, 0, 0.45); padding: 4px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .calendar-cell:hover { background-color: rgba(255, 255, 255, 0.1); }
    .calendar-cell.selected { background-color: rgba(217, 119, 6, 0.85); color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    .calendar-cell.selected .lunar-text { color: #fef3c7; font-weight: bold; }
    
    .day-number { font-size: 1.1rem; font-weight: bold; text-align: right; line-height: 1; position: relative; z-index: 2; }
    .lunar-text { font-size: 0.7rem; text-align: center; color: #d6d3d1; margin-top: 2px; position: relative; z-index: 2; }
    .good-day-dot { position: absolute; bottom: 4px; right: 4px; width: 10px; height: 10px; background-color: #4ade80; border-radius: 50%; box-shadow: 0 0 8px #4ade80; border: 1px solid #fff; z-index: 2; }
    .note-indicator { position: absolute; top: 4px; left: 4px; font-size: 10px; color: #facc15; z-index: 2; text-shadow: 0 0 3px black; }

    .buddhist-lotus-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; opacity: 0.35; z-index: 1; pointer-events: none; filter: drop-shadow(0px 0px 5px rgba(255, 105, 180, 0.8)); }

    @media (max-width: 768px) {
        .text-9xl { font-size: 4.5rem !important; line-height: 1 !important; }
        #leftDay { font-size: 3.5rem !important; }
        .calendar-cell { padding: 2px; }
        .day-number { font-size: 0.9rem; }
        .buddhist-lotus-bg { font-size: 1.5rem; }
        aside { height: 580px !important; flex: none; }
        aside > div:nth-child(3) { height: 35% !important; } 
        aside > div:nth-child(4) { height: 65% !important; } 
    }
  </style>
</head>
<body class="bg-stone-300 h-screen flex flex-col overflow-hidden">

            </div>
        </div>
    </aside>

    <main class="w-full md:w-[65%] bg-stone-300 p-2 md:p-6 md:overflow-y-auto custom-scroll flex flex-col items-center flex-1">

    </main>

    }
    
    function safeSetNote(key, text) {
        try {
            if (text.trim() === "") localStorage.removeItem(key);
            else localStorage.setItem(key, text);

            alert("Trình duyệt đang chặn bộ nhớ tạm. Không thể lưu ghi chú!");

    function checkNgayHoangDao(thangChiIdx, ngayChiIdx) {
        const khoiDaoMap = { 1: 0, 7: 0, 2: 2, 8: 2, 3: 4, 9: 4, 4: 6, 10: 6, 5: 8, 11: 8, 6: 10, 0: 10 };
        let distance = (ngayChiIdx - khoiDaoMap[thangChiIdx] + 12) % 12;
        return [0, 1, 3, 4, 7, 9].includes(distance);
    }

    function getJulianDay(d, m, y) { if (m <= 2) { m += 12; y -= 1; } let A = Math.floor(y / 100); let B = 2 - A + Math.floor(A / 4); return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5; }
    
    function getSolarInfo(d, m) { 
        let currentVal = m * 100 + d; 
        let foundTerm = CAL_DATA.SOLAR_TERMS_FIXED[CAL_DATA.SOLAR_TERMS_FIXED.length - 1]; 
        let calcTerm = foundTerm; 
        let sortedTerms = [...CAL_DATA.SOLAR_TERMS_FIXED].sort((a, b) => (a.m * 100 + a.d) - (b.m * 100 + b.d)); 
        for (let i = 0; i < sortedTerms.length; i++) { 
            let term = sortedTerms[i]; 
            if (currentVal === (term.m * 100 + term.d)) {
                foundTerm = term; 
                calcTerm = term.delay ? (i === 0 ? sortedTerms[sortedTerms.length - 1] : sortedTerms[i - 1]) : term;
                break;
            } else if (currentVal > (term.m * 100 + term.d)) { foundTerm = term; calcTerm = term; } 
            else break;
        } 
        if (m === 1 && d < 5) return { name: "Đông chí", chiMonth: 0, calcChiMonth: 0 }; 
        return { name: foundTerm.name, chiMonth: foundTerm.chiMonth, calcChiMonth: calcTerm.chiMonth }; 
    }
    
    function getCanChiDay(d, m, y) { let jd = getJulianDay(d, m, y); let jdn = Math.floor(jd + 0.5); let dayCanIdx = (jdn + 9) % 10; let dayChiIdx = (jdn + 1) % 12; return { full: `${CAL_DATA.CAN[dayCanIdx]} ${CAL_DATA.CHI[dayChiIdx]}`, canIdx: dayCanIdx, chiIdx: dayChiIdx, jdn: jdn }; }
    function getTruc(dayChiIdx, solarInfo) { return CAL_DATA.TRUC[(dayChiIdx - solarInfo.chiMonth + 12) % 12]; }
    function getDayRating(cIdx, chIdx) { let ec = CAL_DATA.ELEMENTS.CAN[cIdx]; let ech = CAL_DATA.ELEMENTS.CHI[chIdx]; if (ec === ech) return { name: "Bát Chuyên (Đồng Khí)", color: "text-stone-600", desc: "Ngày bình hòa." }; if ((ec===0&&ech===2)||(ec===2&&ech===1)||(ec===1&&ech===3)||(ec===3&&ech===4)||(ec===4&&ech===0)) return { name: "Bảo Nhật (Đại Cát)", color: "text-green-700", desc: "Rất tốt cho mọi việc." }; if ((ech===0&&ec===2)||(ech===2&&ec===1)||(ech===1&&ec===3)||(ech===3&&ec===4)||(ech===4&&ec===0)) return { name: "Thoa Nhật (Tiểu Cát)", color: "text-blue-700", desc: "Tốt vừa, có thể dùng." }; if ((ec===0&&ec===1)||(ec===1&&ech===4)||(ec===4&&ech===2)||(ec===2&&ech===3)||(ec===3&&ech===0)) return { name: "Chế Nhật (Tiểu Hung)", color: "text-amber-600", desc: "Xấu nhẹ, thận trọng." }; return { name: "Phạt Nhật (Đại Hung)", color: "text-red-600 font-bold", desc: "Can khắc Chi. Kỵ làm đại sự." }; }
    function getTuoiXungTrongNgay(dayCanIdx, dayChiIdx) { let xungChiIdx = (dayChiIdx + 6) % 12; let badAges = []; let canXung1 = (dayCanIdx + 4) % 10; badAges.push(CAL_DATA.CAN[canXung1] + " " + CAL_DATA.CHI[xungChiIdx]); let canXung2 = (dayCanIdx + 6) % 10; badAges.push(CAL_DATA.CAN[canXung2] + " " + CAL_DATA.CHI[xungChiIdx]); badAges.push(CAL_DATA.CAN[canXung2] + " " + CAL_DATA.CHI[dayChiIdx]); return badAges.join(", "); }
    function getHacThanDirection(jdn) { let stdIdx = (jdn + 49) % 60; if (stdIdx >= 29 && stdIdx <= 44) return "Trên Trời (Khỏi lo)"; if (stdIdx >= 45 && stdIdx <= 50) return "Đông Bắc"; if (stdIdx >= 51 && stdIdx <= 55) return "Chính Đông"; if (stdIdx >= 56 || stdIdx <= 1) return "Đông Nam"; if (stdIdx >= 2 && stdIdx <= 6) return "Chính Nam"; if (stdIdx >= 7 && stdIdx <= 12) return "Tây Nam"; if (stdIdx >= 13 && stdIdx <= 17) return "Chính Tây"; if (stdIdx >= 18 && stdIdx <= 23) return "Tây Bắc"; if (stdIdx >= 24 && stdIdx <= 28) return "Chính Bắc"; return ""; }
    function checkXungTuoi(dayChiIdx) { const uYear = document.getElementById("birthYear").value; if(!uYear || uYear === "") return false; const uChiIdx = (uYear - 4) % 12; let diff = Math.abs(uChiIdx - dayChiIdx); return diff === 6 || diff === 0; }

    function getBadDaysInfo(lMonth, lDay, dCanIdx, dChiIdx, solarChiMonth, isTuTuyet, isTuLy) { 
        let notes = []; let fsMonth = (solarChiMonth + 10) % 12 + 1;
        const duongCongKyDates = { 1:[13], 2:[11], 3:[9], 4:[7], 5:[5], 6:[3], 7:[1, 29], 8:[27], 9:[25], 10:[23], 11:[21], 12:[19] };
        if (duongCongKyDates[lMonth] && duongCongKyDates[lMonth].includes(lDay)) notes.push({ name: "Dương Công Kỵ", desc: "Đại hung nhật. Trăm sự đều kỵ." });
        if (lDay === 2 || lDay === 16) notes.push({ name: "Ngày Sóc Vọng", desc: "Cúng thí thực, năng lượng âm tà." });
        if (lMonth === 7) notes.push({ name: "Tháng Cô Hồn", desc: "Tháng 7 ÂL âm khí vượng." });
        if ([3, 7, 13, 18, 22, 27].includes(lDay)) notes.push({ name: "Tam Nương", desc: "Kỵ khai trương, xuất hành, cưới hỏi." }); 
        if ([5, 14, 23].includes(lDay)) notes.push({ name: "Nguyệt Kỵ", desc: "Kỵ xuất hành đi xa, khởi công." }); 
        if (isTuTuyet) notes.push({ name: "Tứ Tuyệt", desc: "Ngũ hành mùa cũ tận cùng." });
        if (isTuLy) notes.push({ name: "Tứ Ly", desc: "Âm Dương phân ly." });
        
        if (dChiIdx === CAL_DATA.TAM_TANG_MAP[fsMonth]) notes.push({ name: "Tam Tang", desc: "Đại kỵ khởi công, cưới hỏi, an táng." }); 
        if (dChiIdx === CAL_DATA.THO_TU_MAP[fsMonth]) notes.push({ name: "Thọ Tử", desc: "Trăm sự đều kỵ." }); 
        if (CAL_DATA.SAT_CHU_DUONG_MAP[fsMonth] && CAL_DATA.SAT_CHU_DUONG_MAP[fsMonth].includes(dChiIdx)) notes.push({ name: "Sát Chủ Dương", desc: "Kỵ việc người sống." }); 
        if (CAL_DATA.SAT_CHU_AM_MAP[fsMonth] && CAL_DATA.SAT_CHU_AM_MAP[fsMonth].includes(dChiIdx)) notes.push({ name: "Sát Chủ Âm", desc: "Kỵ việc người chết." }); 
        
        let hasTrungTang = CAL_DATA.TRUNG_TANG_MAP[fsMonth] && CAL_DATA.TRUNG_TANG_MAP[fsMonth].includes(dCanIdx);
        if (hasTrungTang) {
            if (fsMonth === 6 && dCanIdx === 5) notes.push({ name: "Phục Tang", desc: "Kỵ chôn cất." });
            else notes.push({ name: "Trùng Tang", desc: "Đại kỵ an táng." });
        }
        
        if (dChiIdx === 5 || dChiIdx === 11) {
            if (fsMonth === 8 && dCanIdx === 1) notes.push({ name: "Phục Táng", desc: "Đại kỵ an táng." });
            else notes.push({ name: "Trùng Nhật", desc: "Đại kỵ đất đai, tang sự." });
        }
        
        if (dChiIdx === CAL_DATA.TRUNG_PHUC_MAP[fsMonth]) notes.push({ name: "Trùng Phục", desc: "Kỵ tang sự." });
        
        let season = [1,2,3].includes(fsMonth)?0:[4,5,6].includes(fsMonth)?1:[7,8,9].includes(fsMonth)?2:3;
        let ct=[5,8,11,2][season], qt=[1,4,7,10][season];
        if (dChiIdx === ct) notes.push({ name: "Cô Thần", desc: "Kỵ cưới hỏi." });
        if (dChiIdx === qt) notes.push({ name: "Quả Tú", desc: "Kỵ cưới hỏi." });
        return notes; 
    }

    function evaluateTaskDetailed(task, truc, badDaysList, isXungTuoiCaNhan) { 
        let isGood = true, isVeryGood = false, successReasons = [], failReasons = [], warningReasons = [];
        if (task === "ALL") {
            let fatal = badDaysList.filter(b => ["Sát Chủ Dương", "Sát Chủ Âm", "Thọ Tử", "Tam Tang", "Trùng Nhật", "Trùng Tang", "Phục Tang", "Phục Táng", "Dương Công Kỵ", "Trùng Phục", "Tứ Tuyệt", "Tứ Ly"].includes(b.name));
            isGood = !isXungTuoiCaNhan && fatal.length === 0 && !["Phá", "Bế"].includes(truc);
            isVeryGood = isGood && badDaysList.length === 0 && ["Kiến", "Mãn", "Bình", "Định", "Thành", "Khai"].includes(truc);
            return { isGood, isVeryGood, successReasons, failReasons, warningReasons, taskName: "Khảo Sát Chung", goodStars: "" };
        }
        const rules = TASK_RULES[task]; 
        if (isXungTuoiCaNhan) { if (task === "TANG_SU") warningReasons.push("Ngày Xung tuổi: Kỵ hạ huyệt (hợp Hỏa thiêu)."); else { isGood = false; failReasons.push("Ngày Xung tuổi bản mệnh."); } } 
        const fatalBadDays = badDaysList.filter(b => rules.badDays.includes(b.name));
        const minorBadDays = badDaysList.filter(b => !rules.badDays.includes(b.name) && b.name !== "Sát Chủ Dương" && b.name !== "Sát Chủ Âm"); 
        
        if (fatalBadDays.length > 0) { isGood = false; failReasons.push(`Đại Kỵ: ${fatalBadDays.map(b=>b.name).join(", ")}.`); }
        if (minorBadDays.length > 0) warningReasons.push(`Thứ Kỵ: ${minorBadDays.map(b=>b.name).join(", ")}.`); 
        else if (fatalBadDays.length === 0) successReasons.push(`Sạch ngày kỵ.`);
        
        if (rules.badTruc.includes(truc)) { isGood = false; failReasons.push(`Trực ${truc} Đại Kỵ.`); } 
        else if (rules.goodTruc.includes(truc)) successReasons.push(`Trực ${truc} Đại Cát.`); 
        else successReasons.push(`Trực ${truc} bình hòa.`);
        
        if (isGood && minorBadDays.length === 0 && rules.goodTruc.includes(truc) && !isXungTuoiCaNhan) isVeryGood = true;
        return { isGood, isVeryGood, successReasons, failReasons, warningReasons, taskName: rules.name, goodStars: rules.goodStars }; 
    }

    function getCalendarData(solarDate) {
        const d = new Date(solarDate);
        const formatter = new Intl.DateTimeFormat("fr-CA-u-ca-chinese", { day: "numeric", month: "numeric", year: "numeric" });
        const parts = formatter.formatToParts(d);
        let lDay=1, lMonth=1, lYear=d.getFullYear();
        parts.forEach(p => { if(p.type==="day") lDay=parseInt(p.value); if(p.type==="month") lMonth=parseInt(p.value); if(p.type==="relatedYear") lYear=parseInt(p.value); });
        if (lMonth >= 11 && d.getMonth() < 3 && lYear === d.getFullYear()) lYear -= 1;

        const dayInfo = getCanChiDay(d.getDate(), d.getMonth()+1, d.getFullYear());
        const solarInfo = getSolarInfo(d.getDate(), d.getMonth()+1);
        const truc = getTruc(dayInfo.chiIdx, solarInfo);
        const rating = getDayRating(dayInfo.canIdx, dayInfo.chiIdx);
        let isHoangDao = checkNgayHoangDao(lMonth, dayInfo.chiIdx);
        
        let jd = getJulianDay(d.getDate(), d.getMonth()+1, d.getFullYear());
        let jdn = Math.floor(jd + 0.5);
        let diffDays = jdn - 2449719; 
        
        let saoIdx = (10 + (diffDays % 28)) % 28;
        if (saoIdx < 0) saoIdx += 28;
        let saoData = CAL_DATA.NHI_THAP_BAT_TU[saoIdx];

        const tuoiXungNgay = getTuoiXungTrongNgay(dayInfo.canIdx, dayInfo.chiIdx);
        const isXungTuoiCaNhan = checkXungTuoi(dayInfo.chiIdx);
        
        let dTomorrow = new Date(solarDate);
        dTomorrow.setDate(dTomorrow.getDate() + 1);
        let tD = dTomorrow.getDate(); let tM = dTomorrow.getMonth() + 1;
        let isTuTuyet = false; let isTuLy = false;
        let tuTuyetTerms = ["Lập xuân", "Lập hạ", "Lập thu", "Lập đông"];
        let tuLyTerms = ["Xuân phân", "Hạ chí", "Thu phân", "Đông chí"];
        for (let term of CAL_DATA.SOLAR_TERMS_FIXED) {
            if (term.d === tD && term.m === tM) {
                if (tuTuyetTerms.includes(term.name)) isTuTuyet = true;
                if (tuLyTerms.includes(term.name)) isTuLy = true;
            }
        }

        const badDaysList = getBadDaysInfo(lMonth, lDay, dayInfo.canIdx, dayInfo.chiIdx, solarInfo.calcChiMonth, isTuTuyet, isTuLy);

        let partsT = formatter.formatToParts(dTomorrow);
        let lDayT = 1;
        partsT.forEach(p => { if(p.type==="day") lDayT=parseInt(p.value); });
        let isLastDayOfMonth = (lDayT === 1); 

        let bHoliday = CAL_DATA.BUDDHIST_HOLIDAYS[`${lDay}/${lMonth}`];
        if (!bHoliday && isLastDayOfMonth) {
            if (lDay === 29 && lMonth === 7) bHoliday = CAL_DATA.BUDDHIST_HOLIDAYS["30/7"];
            if (lDay === 29 && lMonth === 9) bHoliday = CAL_DATA.BUDDHIST_HOLIDAYS["30/9"];
        }

        let fsMonth = (solarInfo.calcChiMonth + 10) % 12 + 1;
        let hourDetails = [];
        const checkGioHoangDao = (dChi, hChi) => { const map = {0:[0,1,3,6,8,9],1:[2,3,5,8,10,11],2:[0,1,4,5,7,10],3:[0,2,3,6,7,9],4:[2,4,5,8,9,11],5:[1,4,6,7,10,11],6:[0,1,3,6,8,9],7:[2,3,5,8,10,11],8:[0,1,4,5,7,10],9:[0,2,3,6,7,9],10:[2,4,5,8,9,11],11:[1,4,6,7,10,11]}; return map[dChi].includes(hChi); };

        for(let i=0; i<12; i++) {
            const canGio = CAL_DATA.CAN[((dayInfo.canIdx % 5) * 2 + i) % 10]; const chiGio = CAL_DATA.CHI[i];
            const ldIdx = (lMonth + lDay + i - 2) % 6; let lucDieuStr = CAL_DATA.LUC_DIEU[ldIdx < 0 ? ldIdx + 6 : ldIdx];
            let isThoTu = (i === CAL_DATA.GIO_THO_TU_MAP[dayInfo.chiIdx]); 
            let isSatChu = (i === CAL_DATA.GIO_SAT_CHU_MAP[fsMonth]); 
            let isKhongVong = (lucDieuStr === "Không Vong");
            hourDetails.push({ can: canGio, chi: chiGio, chiIdx: i, str: `${canGio} ${chiGio}<br><span class="text-[9px] text-gray-500">(${(i*2-1+24)%24}h-${(i*2+1)%24}h)</span>`, isGood: checkGioHoangDao(dayInfo.chiIdx, i), lucDieu: lucDieuStr, isThoTu: isThoTu, isSatChu: isSatChu, isKhongVong: isKhongVong });
        }
        
        return { solar: { day: d.getDate(), month: d.getMonth()+1, year: d.getFullYear(), weekday: d.getDay() }, lunar: { day: lDay, month: lMonth, year: lYear }, text: { day: dayInfo.full }, extra: { truc, tietKhi: solarInfo.name, hyThan: CAL_DATA.HY_THAN[dayInfo.canIdx], taiThan: CAL_DATA.TAI_THAN[dayInfo.canIdx], hacThan: getHacThanDirection(dayInfo.jdn), badDaysList, isXungTuoiCaNhan, tuoiXungNgay, bHoliday, isHoangDao, sao: saoData }, hourDetails, rating };
    }

            r3 += `<td class="hour-cell border ${h.isKhongVong?'text-red-600 font-bold':''}">${h.lucDieu.replace(" ","<br>")}</td>`;
        });

        // 1. CÁC YẾU TỐ CÁT
        let gd = [];
        if (dData.extra.isHoangDao) gd.push({n:"Hoàng Đạo",d:"Mọi việc hanh thông."});
        if (dData.rating.name.includes("Cát")) gd.push({n:dData.rating.name,d:dData.rating.desc});
        if (["Kiến","Mãn","Bình","Định","Thành","Khai"].includes(dData.extra.truc)) gd.push({n:"Trực "+dData.extra.truc,d:"Khí tốt."});
        if (dData.extra.sao.type.includes("Kiết")) gd.push({n:"Sao "+dData.extra.sao.name,d:dData.extra.sao.type});
        
        // 2. GHI CHÚ CÁ NHÂN
        let selectedDateKey = `${y}_${m+1}_${selDate.getDate()}`;
        let currentNote = safeGetNote('note_' + selectedDateKey) || "";

        // 3. KHỐI GỢI Ý GIỜ HOÀNG ĐẠO
        let hourSuggestionHtml = "";
        if (uYear && uYear !== "") {
            let uChiIdx = (uYear - 4) % 12; let recommendedHours = [];
            dData.hourDetails.forEach(h => {
                let isXungGio = Math.abs(uChiIdx - h.chiIdx) === 6; 
                if (h.isGood && !isXungGio && !h.isThoTu && !h.isSatChu && !h.isKhongVong) {
                    let isLucDieuTot = ["Đại An", "Tốc Hỷ", "Tiểu Cát"].includes(h.lucDieu);
                    let badgeClass = isLucDieuTot ? "bg-green-100 text-green-900 border-green-400" : "bg-blue-50 text-blue-800 border-blue-300";
                    recommendedHours.push(`<div class="inline-block border ${badgeClass} px-2 py-1 rounded m-1 text-xs text-center shadow-sm"><b class="uppercase">${h.can} ${h.chi}</b> <span class="text-[10px] text-gray-600">(${(h.chiIdx*2-1+24)%24}h-${(h.chiIdx*2+1)%24}h)</span><br><span class="text-[10px] italic font-bold">${isLucDieuTot ? "Đại Cát" : "Thứ Cát"}: Hoàng Đạo + ${h.lucDieu}</span></div>`);
                }
            });
            hourSuggestionHtml = recommendedHours.length > 0 ? recommendedHours.join('') : `<span class="text-red-600 font-bold text-xs italic">Không có giờ chuẩn. (Các giờ Hoàng Đạo đều phạm Xung Khắc, Không Vong, Sát Chủ).</span>`;
        } else { 
            hourSuggestionHtml = `<span class="text-stone-500 italic text-xs">Vui lòng nhập Năm Sinh ở thanh Menu phía trên để hệ thống tự động lọc và chọn ra Giờ Đại Cát cho bạn!</span>`; 
        }

        // 4. PHÂN TÍCH CÔNG VIỆC
        let taskHtml = "";
        if (filterTask !== "ALL") {
            let res = evaluateTaskDetailed(filterTask, dData.extra.truc, dData.extra.badDaysList, dData.extra.isXungTuoiCaNhan);
            taskHtml = `<table class="paper-table mt-[-2px]"><tr><td class="p-0 border-2 ${res.isGood?'bg-green-50 border-green-600':'bg-red-50 border-red-400'}"><div class="header-cell p-2 ${res.isGood?'bg-green-200 text-green-900':'bg-red-100 text-red-900'}">${res.taskName.toUpperCase()}</div><div class="p-3 text-sm"><ul class="list-disc pl-5 font-medium">${(res.isGood?res.successReasons:res.failReasons).map(r=>`<li class="mb-1">${r}</li>`).join('')}</ul></div></td></tr></table>`;
        }

        let hyThanStr = dData.extra.hyThan === dData.extra.hacThan ? `<span class="line-through">${dData.extra.hyThan}</span> (Lỗi Hạc)` : dData.extra.hyThan;
        let taiThanStr = dData.extra.taiThan === dData.extra.hacThan ? `<span class="line-through">${dData.extra.taiThan}</span> (Lỗi Hạc)` : dData.extra.taiThan;

        // --- RÁP NỐI TOÀN BỘ HTML ---
        els.paper.innerHTML = `
            <table class="paper-table"><tr>
                <td class="w-[35%] text-center align-top p-4 border-r-2 border-black">
                    <div class="text-xs font-bold uppercase border-b border-black pb-1 inline-block">${wd}</div>
                    <div class="text-9xl font-bold leading-none mt-2 font-serif">${dData.solar.day}</div>
                    <div class="text-xs md:text-sm font-bold mt-4">THÁNG ${dData.solar.month} NĂM ${dData.solar.year}</div>
                    <div class="mt-4 pt-2 border-t border-black space-y-1 font-bold">
                        <div class="text-red-700 bg-red-50 rounded py-0.5 border">Ngày ${dData.text.day}</div>
                        <div class="text-blue-800 bg-blue-50 rounded py-0.5 border">Tháng ${canThang} ${chiThang}</div>
                        <div class="text-stone-800 bg-stone-100 rounded py-0.5 border">Năm ${canNam} ${chiNam}</div>
                    </div>
                </td>
                <td class="w-[30%] text-center bg-stone-50 align-top p-0 border-r-2 border-black">
                    <div class="header-cell pt-2">Tiết khí</div><div class="py-2 font-bold text-blue-800">${dData.extra.tietKhi}</div>
                    <div class="header-cell border-t">Trực ${dData.extra.truc}</div><div class="text-[10px] p-2 leading-tight">${CAL_DATA.TRUC_DESC[dData.extra.truc]}</div>
                    <div class="header-cell border-t">Nhị Thập Bát Tú</div><div class="p-2 font-bold ${dData.extra.sao.color}">Sao ${dData.extra.sao.name}<br>[ ${dData.extra.sao.type} ]</div>
                </td>
                <td class="w-[35%] align-top p-2 text-[11px]">
                    <div class="header-cell mb-2 py-1 bg-amber-100 text-amber-900 border-b-2 border-black">ĐỊNH HƯỚNG & XUNG KHẮC</div>
                    <div class="text-center font-bold ${dData.rating.color} uppercase border-2 border-dashed p-1 mb-2">${dData.rating.name}</div>
                    <div class="bg-stone-200 p-2 border border-stone-400 rounded space-y-1">
                        <div><b class="text-pink-700">Hỷ Thần:</b> ${hyThanStr}</div>
                        <div><b class="text-blue-700">Tài Thần:</b> ${taiThanStr}</div>
                        <div class="border-t border-stone-300 pt-1"><b class="text-gray-700">Hạc Thần:</b> <span class="text-red-700 font-bold">${dData.extra.hacThan}</span></div>
                    </div>
                    <div class="mt-2 pt-1 border-t"><b class="text-gray-700">Xung Ngày:</b> <span class="text-red-700 font-bold">${dData.extra.tuoiXungNgay}</span></div>
                </td>
            </tr></table>

            <table class="paper-table mt-[-2px]">
                <tr>
                    <td class="p-0 bg-amber-50 border-2 border-amber-500">
                        <div class="header-cell p-1 bg-amber-200 text-amber-900 italic">📝 Ghi chú cá nhân (Lưu tại thiết bị này)</div>
                        <div class="p-2 flex gap-2">
                            <textarea id="personalNoteArea" class="flex-1 border border-amber-300 p-1.5 text-sm outline-none rounded" rows="2" placeholder="Hôm nay bạn định làm gì?">${currentNote}</textarea>
                            <button onclick="saveNote('${selectedDateKey}')" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1 rounded font-bold text-sm shadow transition">LƯU</button>
                        </div>
                    </td>
                </tr>
            </table>

            <table class="paper-table mt-[-2px]">
                <tr>
                    <td class="align-top p-0 bg-yellow-50 border-2 border-yellow-500">
                        <div class="header-cell border-b border-yellow-500 p-2 bg-yellow-200 text-yellow-900 tracking-wider">
                            <i class="fa-solid fa-clock"></i> GỢI Ý GIỜ XUẤT HÀNH / KHỞI SỰ TỐT NHẤT CHO TUỔI ${uYear || '...'}
                        </div>
                        <div class="p-3 text-sm leading-relaxed text-stone-800 text-center">
                            ${hourSuggestionHtml}
                        </div>
                    </td>
                </tr>
            </table>

            <div class="w-full overflow-x-auto custom-scroll">
                <table class="paper-table hour-table mt-[-2px]">
                    <tr><td class="hour-cell bg-gray-200 font-bold w-12 border">Giờ</td>${r1}</tr>
                    <tr><td class="hour-cell font-bold border">Đạo</td>${r2}</tr>
                    <tr><td class="hour-cell font-bold border">Lục Diệu</td>${r3}</tr>
                </table>
            </div>
            
            <table class="paper-table mt-[-2px]">
                <tr>
                    <td class="align-top p-0 w-1/2 bg-green-50/50 border-r border-gray-400">
                        <div class="header-cell p-1 bg-green-100 text-green-900 border-b border-gray-400 tracking-wider">🌟 CÁT TỔNG QUAN</div>
                        <div class="p-2 text-[11px]">
                            <ul class="list-disc pl-4 space-y-1">${gd.map(g=>`<li><b>${g.n}:</b> ${g.d}</li>`).join('')}</ul>
                        </div>
                    </td>
                    <td class="align-top p-0 w-1/2 bg-red-50/50">
                        <div class="header-cell p-1 bg-red-100 text-red-900 border-b border-gray-400 tracking-wider">⚠️ HUNG TỔNG QUAN</div>
                        <div class="p-2 text-[11px]">
                            <ul class="list-disc pl-4 space-y-1">${dData.extra.badDaysList.length > 0 ? dData.extra.badDaysList.map(b=>`<li><b class="text-red-700">${b.name}:</b> ${b.desc}</li>`).join('') : '<li class="text-green-700 font-bold">Ngày sạch, không có sát khí!</li>'}</ul>
                        </div>
                    </td>
                </tr>
            </table>
            
            ${taskHtml}
            ${dData.extra.bHoliday ? `<table class="paper-table mt-[-2px]"><tr><td class="p-0 bg-pink-50 border-2 border-pink-500"><div class="header-cell p-2 bg-pink-200 text-pink-900 uppercase tracking-wider">Sự kiện Phật Giáo: ${dData.extra.bHoliday.name}</div><div class="p-3 italic text-stone-800 text-center">${dData.extra.bHoliday.desc}</div></td></tr></table>` : ""}
        `;
    }
    init();
  </script>
</body>
</html>
