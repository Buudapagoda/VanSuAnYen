<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fcfcfc; color: #333; margin: 0; padding: 20px; }
    .ky-tuoi-wrapper { border: 2px solid #8b0000; border-radius: 8px; padding: 20px; max-width: 850px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; }
    h3 { text-align: center; color: #8b0000; margin-top: 0; margin-bottom: 10px; text-transform: uppercase; font-size: 1.4rem;}
    .subtitle-phat { text-align: center; font-style: italic; color: #666; font-size: 14px; margin-bottom: 10px; border-bottom: 1px dashed #d4af37; padding-bottom: 15px; }
    .auto-notice { text-align: center; font-size: 13px; color: #2e7d32; font-weight: bold; margin-bottom: 20px; background: #e8f5e9; padding: 8px; border-radius: 4px;}
    
    .section-box { border: 1px solid #e0e0e0; border-radius: 6px; padding: 15px; margin-bottom: 20px; background: #fafafa; }
    .section-title { font-weight: bold; color: #fff; background-color: #8b0000; padding: 10px 15px; border-radius: 4px; margin: -15px -15px 15px -15px; text-transform: uppercase; font-size: 15px; }
    
    .form-row { margin-bottom: 15px; }
    .form-row label { display: block; font-weight: bold; color: #4a3b32; margin-bottom: 5px; font-size: 14px; }
    .form-row input, .form-row select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; box-sizing: border-box; transition: 0.3s;}
    .form-row input:focus, .form-row select:focus { border-color: #8b0000; outline: none; }
    .form-row-inline { display: flex; gap: 15px; flex-wrap: wrap; }
    .form-row-inline > div { flex: 1; min-width: 150px; }
    
    .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .btn-in { flex: 1; background-color: #2e7d32; color: white; border: none; padding: 15px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.3s; min-width: 200px;}
    .btn-in:hover { background-color: #1b5e20; }
    .btn-anh { flex: 1; background-color: #1976d2; color: white; border: none; padding: 15px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.3s; min-width: 200px;}
    .btn-anh:hover { background-color: #1565c0; }

    .result-box { margin-top: 15px; padding: 15px; background-color: #fff; border: 1px solid #e8dcc4; border-radius: 6px; display: none; line-height: 1.6; box-shadow: inset 0 0 5px rgba(0,0,0,0.05);}
    .res-title { font-weight: bold; color: #8b4513; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; border-bottom: 1px dashed #ccc; padding-bottom: 5px;}
    
    .tag-tot { color: #2e7d32; font-weight: bold; background: #e8f5e9; padding: 3px 8px; border-radius: 4px; border: 1px solid #c8e6c9; font-size: 14px;}
    .tag-tb { color: #856404; font-weight: bold; background: #fff3cd; padding: 3px 8px; border-radius: 4px; border: 1px solid #ffeeba; font-size: 14px;}
    .tag-xau { color: #c0392b; font-weight: bold; background: #ffebee; padding: 3px 8px; border-radius: 4px; border: 1px solid #f5c6cb; font-size: 14px;}
    
    .warning-box { background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 4px; font-size: 14.5px; color: #856404; margin-top: 10px; }
    .adv-box { background-color: #e3f2fd; border-left: 4px solid #2196f3; padding: 12px; border-radius: 4px; font-size: 14.5px; color: #0d47a1; margin-top: 10px; text-align: justify;}
    .danger-box { background-color: #f8d7da; border-left: 4px solid #dc3545; padding: 12px; border-radius: 4px; font-size: 14.5px; color: #721c24; margin-top: 10px; }
    .info-person { font-size: 15.5px; }

    
    .input-danger { border: 3px solid #d32f2f !important; background: #ffebee !important; box-shadow: 0 0 8px rgba(211,47,47,0.5); }

    /* KHU VỰC IN ẨN TRÊN WEB */
    #printArea { display: none; }

    /* CSS ĐỊNH DẠNG KHI IN BẰNG MÁY IN */
    @media print {
        body { background-color: #fff; padding: 0; margin: 0; }
        body > *:not(#printAreaContainer) { display: none; }
        #printArea { display: block !important; position: static !important; width: 100% !important; padding: 0 !important; border: none !important;}
    }
</style>

<body>

<div class="ky-tuoi-wrapper">
    <h3>Tra Cứu Tang Sự & Xuất Ảnh Chuyên Sâu</h3>
    <div class="subtitle-phat">"Hành sự theo thuật số, giải ách bằng Tâm đức."</div>
    <div class="auto-notice"><i class="fa-solid fa-wand-magic-sparkles"></i> Hệ thống tự động phân tích độc lập khi bạn nhập dữ liệu!</div>

    <div class="section-box">
        <div class="section-title">I. Thông Tin Cơ Bản Người Mất</div>
        <div class="form-row form-row-inline">
            <div style="flex: 2;">
                <label>Họ và Tên:</label>
                <input type="text" id="inpHoTen" placeholder="VD: Nguyễn Văn A">
            </div>
            <div style="flex: 1;">
                <label>Giới tính:</label>
                <select id="selGioiTinh">
                    <option value="nam">Nam Giới</option>
                    <option value="nu">Nữ Giới</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Năm sinh (Âm lịch):</label>
                <input type="number" id="inpNamSinh" placeholder="VD: 1996">
            </div>
        </div>
        <div id="resNguoiMat" class="result-box"></div>
    </div>

    <div class="section-box">
        <div class="section-title">II. Thời Điểm Mất & Luận Trùng Tang</div>
        <div class="form-row form-row-inline">
            <div>
                <label>Ngày mất (Dương lịch):</label>
                <input type="date" id="inpNgayMatDL">
            </div>
            <div>
                <label>Giờ mất chính xác:</label>
                <input type="time" id="inpGioMatDL">
            </div>
        </div>
        
        <div class="form-row form-row-inline" style="background: #fff8e1; padding: 10px; border: 1px dashed #d4af37; border-radius: 4px;">
            <div>
                <label>Ngày mất (Âm lịch):</label>
                <input type="number" id="inpNgayMatAL" placeholder="VD: 25">
            </div>
            <div>
                <label>Tháng mất (Âm lịch):</label>
                <input type="number" id="inpThangMatAL" placeholder="VD: 3">

                <label>Năm mất (Âm lịch):</label>
                <input type="number" id="inpNamMatAL" placeholder="VD: 2026">

        </div>
        <div id="resTrungTang" class="result-box"></div>

    <div class="section-box">
        <div class="section-title">III. Thời Gian Hành Lễ & Ngày/Giờ Kỵ Tuổi</div>
        <div class="form-row form-row-inline">
            <div>
                <label>Lúc Khâm Liệm:</label>
                <div style="display: flex; gap: 5px;">
                    <input type="date" id="inpNgayLiem" style="flex: 3;">
                    <input type="time" id="inpGioLiem" style="flex: 2;">
                </div>
            </div>
            <div>
                <label>Lúc Động Quan (Hạ huyệt):</label>
                <div style="display: flex; gap: 5px;">
                    <input type="date" id="inpNgayDongQuan" style="flex: 3;">
                    <input type="time" id="inpGioDongQuan" style="flex: 2;">
                </div>
            </div>
        </div>
        <div id="resHanhLe" class="result-box"></div>
    </div>

    <div class="section-box">
        <div class="section-title">IV. Cải Táng (Bốc Mộ)</div>
        <div class="form-row">
            <label>Nhập Năm định Cải táng (Âm lịch):</label>
            <input type="number" id="inpNamCaiTang" placeholder="VD: 2028 (Hệ thống tự tính Cung Lạc Mệnh của năm bốc)">
        </div>
        <div id="resCaiTang" class="result-box"></div>
    </div>

    <hr style="border-top: 2px dashed #8b0000; margin-top: 30px; margin-bottom: 20px;">
    
    <div class="form-row form-row-inline">
        <div style="flex: 2;">
            <label>Địa chỉ tang quyến (Để in phiếu):</label>
            <input type="text" id="inpDiaChi" placeholder="Nhập số nhà, đường, phường/xã...">
        </div>
        <div style="flex: 1;">
            <label>Số điện thoại:</label>
            <input type="text" id="inpSDT" placeholder="0909...">
        </div>
    </div>
    
    <div class="btn-group">
        <button class="btn-in" onclick="window.print()"><i class="fa-solid fa-print"></i> In Phiếu Tang Sự</button>
        <button class="btn-anh" onclick="taiAnhVeMay()"><i class="fa-solid fa-download"></i> Lưu Ảnh Chia Sẻ</button>
    </div>
</div>

<div id="printAreaContainer">
    <div id="printArea" style="font-family: 'Times New Roman', Times, serif; color: #000; padding: 40px; background: #fff; width: 800px; box-sizing: border-box; border: 2px solid #000;">
    </div>
</div>

<script>
    // --- THƯ VIỆN DỮ LIỆU ---
    const CAN = ["Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ", "Canh", "Tân", "Nhâm", "Quý"];
    const CHI = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];

    // --- HÀM TIỆN ÍCH ---
    // Giờ Âm Dương dùng trong Tang sự: lệch 1 tiếng so với giờ địa chi thường.
    // Tý: 00h00-01h59, Sửu: 02h00-03h59, ... Hợi: 22h00-23h59.
    function getChiIdxFromHour(hour) { return Math.floor(hour / 2) % 12; }
    function getGioAmDuongRange(chiIdx) {
        const start = (chiIdx * 2) % 24;
        const end = (start + 2) % 24;
        return `${start.toString().padStart(2, '0')}h00 - ${end.toString().padStart(2, '0')}h00`;
    }
    function getCungGioHaHuyet(timeStr) {
        if (!timeStr) return null;
        const [hhStr, mmStr] = timeStr.split(":");
        const hh = parseInt(hhStr, 10);
        const mm = parseInt(mmStr || "0", 10);
        const chiIdx = getChiIdxFromHour(hh);
        const xungIdx = (chiIdx + 6) % 12;
        const tamHopMap = {
            0: [8, 4], 4: [0, 8], 8: [4, 0],      // Thân Tý Thìn
            2: [6, 10], 6: [10, 2], 10: [2, 6],   // Dần Ngọ Tuất
            11: [3, 7], 3: [7, 11], 7: [11, 3],   // Hợi Mão Mùi
            5: [9, 1], 9: [1, 5], 1: [5, 9]       // Tỵ Dậu Sửu
        };
        const kyChi = [chiIdx, xungIdx, ...(tamHopMap[chiIdx] || [])];
        const kyUnique = [...new Set(kyChi)].map(i => CHI[i]);
        const timeFmt = `${hh.toString().padStart(2, '0')}h${mm.toString().padStart(2, '0')}`;
        return {
            chiIdx,
            chiGio: CHI[chiIdx],
            gioText: `${timeFmt} (Giờ ${CHI[chiIdx]}: ${getGioAmDuongRange(chiIdx)})`,
            tuoiKy: kyUnique.join(", "),
            tuoiKyChinh: `${CHI[chiIdx]}, ${CHI[xungIdx]}`
        };
    }
    function getJulianDay(dd, mm, yyyy) {
        let a = Math.floor((14 - mm) / 12); let y = yyyy + 4800 - a; let m = mm + 12 * a - 3;
        return dd + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
    }
    function getCanChiDay(jd) { return CAN[(jd + 9) % 10] + " " + CHI[(jd + 1) % 12]; }
    function getCanChiYear(year) { return CAN[(year + 6) % 10] + " " + CHI[(year + 8) % 12]; }
    function getCanChiMonth(lunarYear, lunarMonth) {
        let yearCanIdx = (lunarYear + 6) % 10;
        return CAN[(yearCanIdx * 2 + lunarMonth + 1) % 10] + " " + CHI[(lunarMonth + 1) % 12];
    }
    function getCanChiHour(jd, hour) {
        let chiIdx = getChiIdxFromHour(hour); let canDayIdx = (jd + 9) % 10;
        return CAN[(canDayIdx * 2 + chiIdx) % 10] + " " + CHI[chiIdx];
    }
    function formatDate(d) { return (d < 10 ? '0' : '') + d; }

    // --- CÁC THUẬT TOÁN PHONG THỦY ---

    // 1. Cung Phi theo tuổi mụ / Cung Tử
    // Quy tắc anh chốt:
    // - Không nhập Trung cung.
    // - Nam: 10 tuổi khởi Cấn, đếm thuận chiều kim đồng hồ.
    // - Nữ: 10 tuổi khởi Khôn, đếm nghịch chiều kim đồng hồ.
    // - Hết hàng chục rồi đếm tiếp hàng lẻ: ví dụ 34 tuổi = 10,20,30,31,32,33,34.
    // - Áp dụng chung cho phần Cung Tử và phần Cải Táng.
    function tinhCungPhiBangTay(tuoiMu, gioiTinh) {
        if (!tuoiMu || tuoiMu < 1) {
            return {
                cung: "",
                isTot: false,
                classColor: "tag-tb",
                danhGia: "Chưa đủ dữ liệu"
            };
        }

        const vongNamThuan = ["Cấn", "Chấn", "Tốn", "Ly", "Khôn", "Đoài", "Càn", "Khảm"];
        const vongNuNghich = ["Khôn", "Ly", "Tốn", "Chấn", "Cấn", "Khảm", "Càn", "Đoài"];
        const vong = (gioiTinh === "nam") ? vongNamThuan : vongNuNghich;

        // Tuổi tròn chục: 10, 20, 30... lấy đúng theo số chục.
        // Tuổi có lẻ: lấy cung của hàng chục rồi đếm tiếp từng tuổi lẻ.
        let chuc = Math.floor(tuoiMu / 10);
        let le = tuoiMu % 10;

        if (chuc === 0) {
            chuc = 1;
        }

        let buocDem = (chuc - 1) + le;
        let cung = vong[((buocDem % 8) + 8) % 8];

        // Đánh giá cung theo quy ước đang dùng trong chương trình.
        const cungTotNhat = ["Chấn", "Khôn"];
        const cungTotNhi = ["Cấn", "Khảm"];
        const cungTrungBinh = ["Đoài", "Tốn"];

        let classColor = cungTotNhat.includes(cung) ? "tag-tot"
            : (cungTotNhi.includes(cung) ? "tag-tot"
            : (cungTrungBinh.includes(cung) ? "tag-tb" : "tag-xau"));

        let danhGia = cungTotNhat.includes(cung) ? "Tốt Nhất"
            : (cungTotNhi.includes(cung) ? "Tốt Nhì"
            : (cungTrungBinh.includes(cung) ? "Trung Bình" : "Xấu Nhất"));

        return {
            cung: cung,
            isTot: [...cungTotNhat, ...cungTotNhi].includes(cung),
            classColor: classColor,
            danhGia: danhGia
        };
    }


    // Cung Phi Bát Trạch chuẩn theo năm và giới tính.
    // Dùng riêng cho Cải Táng để không lẫn với cung tính theo tuổi mụ/cung tử.
    function tinhCungPhiBatTrach(nam, gioiTinh) {
        let tong = String(nam).split("").reduce((s, ch) => s + parseInt(ch, 10), 0);
        while (tong > 9) tong = String(tong).split("").reduce((s, ch) => s + parseInt(ch, 10), 0);

        let soCung;
        if (nam >= 2000) {
            soCung = (gioiTinh === 'nam') ? (9 - tong) : (6 + tong);
        } else {
            soCung = (gioiTinh === 'nam') ? (10 - tong) : (5 + tong);
        }
        soCung = ((soCung - 1) % 9 + 9) % 9 + 1;

        // Nam gặp số 5 quy Khôn, nữ gặp số 5 quy Cấn.
        if (soCung === 5) soCung = (gioiTinh === 'nam') ? 2 : 8;

        const cungTheoSo = {1: "Khảm", 2: "Khôn", 3: "Chấn", 4: "Tốn", 6: "Càn", 7: "Đoài", 8: "Cấn", 9: "Ly"};
        const cung = cungTheoSo[soCung];
        const cungTot = ["Chấn", "Khôn", "Cấn", "Khảm"].includes(cung);
        return {
            cung,
            isTot: cungTot,
            classColor: cungTot ? "tag-tot" : "tag-xau",
            danhGia: cungTot ? "Được cải táng" : "Không được cải táng"
        };
    }

    // Hướng tốt để chôn lại theo Cung Phi CẢI TÁNG.
    // Bảng này chép theo ảnh Bát Trạch anh gửi:
    // Cột dùng để lấy hướng tốt: Sinh Khí, Phước Đức, Thiên Y, Phục Vị.
    function getHuongTotTheoCungPhi(cung) {
        const huongCung = {
            "Càn": "Tây Bắc",
            "Khảm": "Chánh Bắc",
            "Cấn": "Đông Bắc",
            "Chấn": "Chánh Đông",
            "Tốn": "Đông Nam",
            "Ly": "Chánh Nam",
            "Khôn": "Tây Nam",
            "Đoài": "Chánh Tây"
        };

        const data = {
            "Càn": {
                nhom: "Tây Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Đoài" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Khôn" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Cấn" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Càn" }
                ]
            },
            "Khảm": {
                nhom: "Đông Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Tốn" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Ly" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Chấn" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Khảm" }
                ]
            },
            "Cấn": {
                nhom: "Tây Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Khôn" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Đoài" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Càn" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Cấn" }
                ]
            },
            "Chấn": {
                nhom: "Đông Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Ly" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Tốn" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Khảm" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Chấn" }
                ]
            },
            "Tốn": {
                nhom: "Đông Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Khảm" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Chấn" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Ly" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Tốn" }
                ]
            },
            "Ly": {
                nhom: "Đông Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Chấn" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Khảm" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Tốn" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Ly" }
                ]
            },
            "Khôn": {
                nhom: "Tây Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Cấn" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Càn" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Đoài" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Khôn" }
                ]
            },
            "Đoài": {
                nhom: "Tây Tứ Trạch",
                huong: [
                    { sao: "Sinh Khí", cap: "Tốt nhất", cungHuong: "Càn" },
                    { sao: "Phước Đức", cap: "Tốt nhì", cungHuong: "Cấn" },
                    { sao: "Thiên Y", cap: "Tốt ba", cungHuong: "Khôn" },
                    { sao: "Phục Vị", cap: "Tốt tư", cungHuong: "Đoài" }
                ]
            }
        };

        const result = data[cung];
        if (!result) return null;
        result.huong = result.huong.map(h => ({
            ...h,
            huong: huongCung[h.cungHuong]
        }));
        return result;
    }

    // 2. Bàn tay Huỳnh Long
    function tinhBanTayHuynhLong(chiSinh, chiMat) {
        const hl = ["Thần", "Tề", "Mục", "Dĩ", "Tảng", "Phúc", "Giác", "Nhĩ", "Yêu", "Túc", "Tỷ", "Trường"];
        let start = ["Thân","Tý","Thìn"].includes(chiSinh) ? "Thìn" : (["Dần","Ngọ","Tuất"].includes(chiSinh) ? "Tuất" : (["Hợi","Mão","Mùi"].includes(chiSinh) ? "Mùi" : "Sửu"));
        let dist = (CHI.indexOf(chiMat) - CHI.indexOf(start) + 12) % 12;
        let cungHL = hl[dist];
        return { cung: cungHL, isTot: ["Nhĩ", "Tề", "Tảng", "Tỷ", "Phúc", "Trường"].includes(cungHL), startChi: start };
    }

    // 3. Luật Ngày/Giờ Kỵ theo nhóm tuổi người mất
    function getNgayKyDiChon(chiSinh) {
        if (["Thân", "Tý", "Thìn"].includes(chiSinh)) return "Tỵ";
        if (["Dần", "Ngọ", "Tuất"].includes(chiSinh)) return "Hợi";
        if (["Hợi", "Mão", "Mùi"].includes(chiSinh)) return "Thân";
        if (["Tỵ", "Dậu", "Sửu"].includes(chiSinh)) return "Dần";
        return "";
    }

    // 4. Tuổi kỵ theo Giờ Lục Xung
    function getKyLiemDongQuan(timeStr) {
        if (!timeStr) return null;
        let parts = timeStr.split(":");
        let hh = parseInt(parts[0]);
        let mm = parseInt(parts[1]);
        let timeFmt = `${hh < 10 ? '0'+hh : hh}h${mm < 10 ? '0'+mm : mm}`;

        let chiIdx = getChiIdxFromHour(hh); 
        let xungIdx = (chiIdx + 6) % 12;
        
        let textGio = `${timeFmt} (Giờ ${CHI[chiIdx]}: ${getGioAmDuongRange(chiIdx)})`;
        let textKy = `${CHI[chiIdx]}, ${CHI[xungIdx]}`;
        
        return { ten: textGio, ky: textKy, chiGio: CHI[chiIdx], chiIdx: chiIdx };
    }

    
    function danhDauGioTrung(inputId, chiSinh) {
        const el = document.getElementById(inputId);
        if (!el || !el.value) { if(el) el.classList.remove('input-danger'); return; }
        const r = getKyLiemDongQuan(el.value);
        const kyDay = getNgayKyDiChon(chiSinh);
        const biPham = (r.chiGio === "Tỵ" || r.chiGio === "Hợi" || r.chiGio === kyDay);
        if (biPham) {
            el.classList.add('input-danger');
        } else {
            el.classList.remove('input-danger');
        }
    }

                if (ngayDQ) {
                    let [y, m, d] = ngayDQ.split("-").map(Number);
                    let jd = getJulianDay(d, m, y);
                    let chiNgay = CHI[(jd + 1) % 12];
                    if (chiNgay === kyDay) {
                        phamNgayTxt = ` <br><span style="color:#c0392b; font-weight:bold; margin-left: 20px;">[❌ ĐẠI KỴ NGÀY ${kyDay.toUpperCase()}]</span>`;
                    }
                }

                const cungHaHuyet = getCungGioHaHuyet(gDongQuan);
                let kyText = `Cung giờ Hạ Huyệt: Cung ${cungHaHuyet.chiGio} - Tuổi kỵ: ${cungHaHuyet.tuoiKyChinh}`;
                if (rDQ.chiGio === "Tỵ" || rDQ.chiGio === "Hợi" || rDQ.chiGio === kyDay) {
                    kyText += ` - PHẠM GIỜ TRÙNG / TỴ-HỢI / GIỜ KỴ TUỔI ${chiSinh}: GIỜ ${rDQ.chiGio}!`;
                }

                htmlIn += `<div><b>- Động Quan:</b> ${dateTxt}${rDQ.ten}${phamNgayTxt}<br><i style="margin-left: 20px;">${kyText}</i></div>`;
            }
            htmlIn += `</div>`;
        }

        // 4. Thông tin liên hệ
        htmlIn += `<div style="font-size: 19px; line-height: 1.8; border-top: 1px dashed #000; padding-top: 15px;">`;
        htmlIn += `<div><b>Địa chỉ Tang Quyến:</b> ${diaChi}</div>`;
        htmlIn += `<div><b>Điện thoại liên hệ:</b> ${sdt}</div>`;
        htmlIn += `</div>`;

        document.getElementById("printArea").innerHTML = htmlIn;
    }

    // --- TRIGGER AUTO CALCULATE ---
    function calculateAll() {
        updateSection1();
        updateSection2();
        updateSection3();
        if(document.getElementById("inpNamSinh").value){
            let ns=parseInt(document.getElementById("inpNamSinh").value);
            let chiSinh=CHI[(ns + 8) % 12];
            danhDauGioTrung("inpGioLiem", chiSinh);
            danhDauGioTrung("inpGioDongQuan", chiSinh);
        }
        updateSection4();
        updatePrintData();
    }

    document.querySelectorAll("input, select").forEach(el => {
        el.addEventListener("input", calculateAll);
        el.addEventListener("change", calculateAll);
    });

    // --- HÀM CHỤP ẢNH ---
    function taiAnhVeMay() {
        let printArea = document.getElementById("printArea");
        printArea.style.display = "block";
        printArea.style.position = "absolute";
        printArea.style.top = "-9999px"; 
        printArea.style.left = "0";

        html2canvas(printArea, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            let link = document.createElement('a');
            link.download = 'Phieu-Thong-Tin-Tang-Su.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
            printArea.style.display = "none";
            printArea.style.position = "static";
        });
    }
</script>
